*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--orange:#FF6B00;--blue:#1A8CFF;--dark:#080A0E;--panel:#0D1018;--card:#12141E;--border:#1C2030;--text:#E8EEF8;--dim:#50607A;}
body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 14px 72px;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 55% 30% at 20% 5%,rgba(255,107,0,0.07) 0%,transparent 70%),radial-gradient(ellipse 45% 25% at 80% 90%,rgba(26,140,255,0.06) 0%,transparent 70%);pointer-events:none;z-index:0;}
.header{text-align:center;position:relative;z-index:1;margin-bottom:6px;}
.title{font-family:'Rajdhani',sans-serif;font-size:clamp(1.4rem,5vw,2.8rem);font-weight:700;letter-spacing:0.08em;line-height:1.1;color:var(--text);text-shadow:0 0 25px rgba(255,107,0,0.3);}
.title .accent{color:var(--orange);}
.subtitle{font-size:0.68rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--dim);margin-top:5px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px 18px;width:100%;max-width:800px;position:relative;z-index:1;margin-top:22px;}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.pill{font-size:0.67rem;letter-spacing:0.1em;text-transform:uppercase;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:#080A12;color:var(--dim);cursor:pointer;transition:all 0.12s;}
.pill:hover{border-color:var(--orange);color:var(--text);}
.pill.active{background:var(--orange);border-color:var(--orange);color:#fff;}
.pill.dlc.active{background:#9B30FF;border-color:#9B30FF;}
.pill.akatsuki.active{background:#CC0000;border-color:#CC0000;}
.btn-wrap{display:flex;justify-content:center;}
.btn-gen{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:0.12em;background:linear-gradient(135deg,#FF6B00,#CC4400);color:#fff;border:none;border-radius:8px;padding:13px 40px;cursor:pointer;transition:transform 0.12s,box-shadow 0.15s;}
.btn-gen:hover{transform:scale(1.04);box-shadow:0 0 22px rgba(255,107,0,0.4);}
.btn-gen:active{transform:scale(0.97);}
#result{display:none;flex-direction:column;gap:14px;margin-top:20px;}
.fight-row{display:grid;grid-template-columns:1fr 44px 1fr;align-items:center;}
.fighter-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 14px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
.fp-owner{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--dim);}
.fp-name{font-family:'Rajdhani',sans-serif;font-size:clamp(1rem,3.5vw,1.5rem);font-weight:700;letter-spacing:0.05em;color:var(--text);line-height:1.2;}
.fp-tag{font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;padding:3px 8px;border-radius:10px;}
.fp-tag.konoha{background:rgba(255,107,0,0.15);color:var(--orange);}
.fp-tag.akatsuki{background:rgba(200,0,0,0.15);color:#FF4444;}
.fp-tag.sand{background:rgba(200,160,0,0.15);color:#D4A017;}
.fp-tag.other{background:rgba(255,255,255,0.06);color:var(--dim);}
.fp-tag.boruto{background:rgba(26,140,255,0.15);color:var(--blue);}
.fp-tag.otsutsuki{background:rgba(155,48,255,0.15);color:#B060FF;}
.vs-col{display:flex;align-items:center;justify-content:center;}
.vs-badge{font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;color:var(--orange);text-shadow:0 0 10px rgba(255,107,0,0.4);}
.scenario-box{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--orange);border-radius:10px;padding:16px 14px;}
.scenario-label{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--orange);margin-bottom:8px;font-weight:600;}
.scenario-text{font-size:0.86rem;line-height:1.65;color:#8898C8;}
.cursor{display:inline-block;width:2px;height:0.85em;background:var(--orange);margin-left:2px;vertical-align:text-bottom;animation:blink 0.7s steps(1) infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ── TTS button ── */
.tts-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);

.tts-btn.playing{color:#FFD700;border-color:rgba(255,215,0,0.4);background:rgba(255,215,0,0.08);}
.tts-btn.loading{opacity:0.6;cursor:wait;}

let activeFilter='all';

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getPool(){return activeFilter==='all'?ALL:ALL.filter(c=>c.t.includes(activeFilter));}
function typewrite(el,text,speed=16){el.innerHTML='';let i=0;const cur=document.createElement('span');cur.className='cursor';el.appendChild(cur);const tick=()=>{if(i<text.length){el.insertBefore(document.createTextNode(text[i++]),cur);setTimeout(tick,speed);}else{cur.remove();}};tick();}
document.getElementById('genBtn').addEventListener('click',()=>{
  const pool=getPool();
  if(pool.length<2){alert('Not enough fighters. Try All.');return;}
  const s=shuffle(pool);
  const f1=s[0],f2=s.find(c=>c.n!==f1.n);
  if(!f2){alert('Need at least 2 fighters.');return;}
  const [joe,cpu]=Math.random()<0.5?[f1,f2]:[f2,f1];
  document.getElementById('nameJoe').textContent=joe.n;
  const tj=document.getElementById('tagJoe');tj.textContent=TAG_LABELS[joe.tc]||joe.tc;tj.className='fp-tag '+joe.tc;

  const tc=document.getElementById('tagCpu');tc.textContent=TAG_LABELS[cpu.tc]||cpu.tc;tc.className='fp-tag '+cpu.tc;
  document.getElementById('result').style.display='flex';
  document.getElementById('ttsBtn').style.display='inline-flex';
  const t=SCENARIOS[Math.floor(Math.random()*SCENARIOS.length)];
  typewrite(document.getElementById('scenarioText'),t.replace(/\{A\}/g,joe.n).replace(/\{B\}/g,cpu.n));
});

    ttsAudio.currentTime = 0;
    btn.textContent = '🔊 Read Aloud';
    btn.classList.remove('playing');
    return;
  }

  // get the actual rendered text from the DOM right now
  const el = document.getElementById('scenarioText');
  const actualText = (el ? (el.innerText || el.textContent) : text).trim();

  if (!actualText || actualText.length < 5) {
    btn.textContent = '⏳ Still generating...';
    setTimeout(() => { btn.textContent = '🔊 Read Aloud'; }, 1500);
    return;
  }

  btn.textContent = '⏳ Loading...';
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const r = await fetch(TTS_URL + '/tts', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text: actualText})
    });
    if (!r.ok) throw new Error('Server error ' + r.status);
    const data = await r.json();
    if (data.error) throw new Error(data.error);

    ttsAudio.src = TTS_URL + data.path;
    ttsAudio.onended = () => {
      btn.textContent = '🔊 Read Aloud';
      btn.classList.remove('playing');
    };
    await ttsAudio.play();
    btn.textContent = '⏹ Stop';
    btn.classList.remove('loading');
    btn.classList.add('playing');
  } catch(e) {
    console.error('TTS error:', e);
    btn.textContent = '🔊 Read Aloud';
    btn.classList.remove('loading','playing');
    alert('TTS error: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
